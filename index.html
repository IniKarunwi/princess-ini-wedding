<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Princess &amp; IniOluwa — Wedding Invitation</title>
    <meta name="description" content="You're invited! Join us on September 26, 2026 in Asokoro, Abuja." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ===================== FAVICON (unchanged) ===================== -->
    <link rel="icon" type="image/x-icon"           href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180"    href="/apple-touch-icon.png" />

    <!-- Web app manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme colour -->
    <meta name="theme-color" content="#2e5e40" />
    <meta name="msapplication-TileColor" content="#2e5e40" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />

    <!-- ============ SOCIAL PREVIEW (og-image.jpg — 1200×630) ============
         Platforms covered: WhatsApp, iMessage, Facebook, LinkedIn,
         X (Twitter), Discord, Slack.

         Requires: public/og-image.jpg  (1200×630 px, < 5 MB, JPEG)
         WhatsApp : needs absolute URL — works once deployed to a real domain.
         Twitter  : summary_large_image renders the wide card format.
         Discord  : reads og:image directly; 1200×630 renders banner-style.
         Slack    : reads og:image; title+description appear below.
    ================================================================== -->

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, Discord, Slack) -->
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="Princess &amp; IniOluwa — Wedding Invitation" />
    <meta property="og:description"  content="You're invited! Join us on September 26, 2026 in Asokoro, Abuja." />
    <meta property="og:image"        content="/og-image.jpg" />
    <meta property="og:image:type"   content="image/jpeg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Princess &amp; IniOluwa — Wedding Invitation, September 26, 2026" />

    <!-- X / Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Princess &amp; IniOluwa — Wedding Invitation" />
    <meta name="twitter:description" content="You're invited! Join us on September 26, 2026 in Asokoro, Abuja." />
    <meta name="twitter:image"       content="/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Princess &amp; IniOluwa — Wedding Invitation, September 26, 2026" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
